name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Inject D1 database ID from secrets
        shell: pwsh
        run: (Get-Content wrangler.toml) -replace '__D1_DATABASE_ID__', '${{ secrets.D1_DATABASE_ID }}' | Set-Content wrangler.toml

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=cashflow --commit-dirty=true
